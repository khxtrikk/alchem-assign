services:
  engine:
    image: ${ECR_REGISTRY_URL}:latest
    restart: always
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./.iii:/app/.iii
      - ./data:/app/data
    ports:
      - "3111"
      - "3112"
      - "49134"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/engine/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - engine
